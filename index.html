<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0b7a52" />

    <!-- Primary meta (static defaults; per-route values set at runtime by useSeo) -->
    <title>Konnect — Fresh, delicious food delivered to your door</title>
    <meta
      name="description"
      content="Konnect is Nigeria's food delivery app — order from your favourite local kitchens with live tracking, fast delivery and secure payments. Partner as a restaurant, ride as a courier, or earn as an ambassador."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://konnectbd.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Konnect" />
    <meta property="og:title" content="Konnect — Fresh, delicious food delivered to your door" />
    <meta
      property="og:description"
      content="Order from your favourite local kitchens with live tracking, fast delivery and secure payments. Partner, ride or earn with Konnect."
    />
    <meta property="og:url" content="https://konnectbd.com/" />
    <meta property="og:image" content="https://konnectbd.com/og-image.png" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Konnect — Fresh, delicious food delivered to your door" />
    <meta
      name="twitter:description"
      content="Order from your favourite local kitchens with live tracking, fast delivery and secure payments. Partner, ride or earn with Konnect."
    />
    <meta name="twitter:image" content="https://konnectbd.com/og-image.png" />

    <link rel="manifest" href="/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Organization structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Konnect",
        "legalName": "Consukon Limited",
        "url": "https://konnectbd.com",
        "logo": "https://konnectbd.com/favicon.svg",
        "description": "Nigeria's food delivery app — order from your favourite local kitchens with live tracking, fast delivery and secure payments.",
        "email": "konnect@consukon.com",
        "areaServed": "NG",
        "sameAs": [
          "https://www.instagram.com/",
          "https://x.com/",
          "https://www.tiktok.com/"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
